name: Build iOS IPA (SideStore)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: expo-app/package-lock.json

      - name: Install dependencies
        working-directory: expo-app
        run: npm install

      - name: Prebuild iOS project
        working-directory: expo-app
        env:
          CI: 1
        run: npx expo prebuild --platform ios

      - name: Configure Xcode environment
        working-directory: expo-app/ios
        run: |
          NODE_PATH=$(which node)
          echo "export NODE_BINARY=$NODE_PATH" > .xcode.env
          echo "export NODE_BINARY=$NODE_PATH" > .xcode.env.local

      - name: Build unsigned IPA
        working-directory: expo-app/ios
        run: |
          export NODE_BINARY=$(which node)
          
          # Workspaceファイルの特定
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "Target Workspace: $WORKSPACE"
          
          # スキーマ名の正確な特定 (xcodebuildから直接リストを取得)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | grep -A 10 "Schemes:" | tail -n +2 | head -n 1 | xargs)
          echo "Target Scheme: $SCHEME"
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

          mkdir -p Payload
          # アプリケーションフォルダから .app ファイルを探してコピー
          APP_PATH=$(find build/App.xcarchive/Products/Applications -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r ../../NichikokaApp.ipa Payload
          cd ../..

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NichikokaApp-IPA
          path: NichikokaApp.ipa
          retention-days: 30
